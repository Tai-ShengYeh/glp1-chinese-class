<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>課前暖身投票 ｜ GLP-1 食品營養華語</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Microsoft JhengHei', 'PingFang TC', sans-serif;
  background: #FFFDFC;
  color: #1F2933;
  min-height: 100vh;
  padding: 16px;
  font-size: 16px;
}
.container { max-width: 640px; margin: 0 auto; }
header {
  background: #22344A;
  color: white;
  padding: 18px 22px;
  border-radius: 12px;
  margin-bottom: 20px;
  text-align: center;
}
header h1 { font-size: 22px; margin-bottom: 4px; }
header .sub { color: #F5EEE6; font-size: 13px; }
.q-card {
  background: white;
  border: 1px solid #D9E1E8;
  border-radius: 14px;
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.04);
}
.q-card.q1 { border-top: 4px solid #ECF3FA; }
.q-card.q2 { border-top: 4px solid #FCEDE5; }
.q-card.q3 { border-top: 4px solid #E7F3F1; }
.q-num {
  display: inline-block;
  background: #D96A3B;
  color: white;
  font-weight: bold;
  font-size: 13px;
  padding: 3px 12px;
  border-radius: 14px;
  margin-bottom: 10px;
}
.q-text {
  font-size: 19px;
  font-weight: bold;
  margin-bottom: 16px;
  line-height: 1.5;
  color: #1F2933;
}
.options { display: grid; gap: 8px; }
.option-btn {
  background: #F5EEE6;
  border: 2px solid transparent;
  border-radius: 10px;
  padding: 14px 18px;
  cursor: pointer;
  transition: all 0.2s;
  font-size: 16px;
  font-weight: bold;
  font-family: inherit;
  text-align: center;
  color: #1F2933;
  min-height: 52px;
  width: 100%;
}
.option-btn:hover { background: #FCEDE5; border-color: #D96A3B; }
.option-btn:disabled { cursor: default; opacity: 0.5; }
.option-btn.selected {
  background: #E8F1EA;
  border-color: #4A7C59;
  color: #4A7C59;
  cursor: default;
}
.option-btn.selected::before { content: '✅ '; }
.thanks-msg {
  margin-top: 12px;
  padding: 8px 12px;
  background: #E8F1EA;
  color: #4A7C59;
  border-radius: 8px;
  font-size: 13px;
  text-align: center;
  display: none;
}
.thanks-msg.show { display: block; }
.footer {
  text-align: center;
  margin-top: 20px;
  font-size: 12px;
  color: #5B6777;
}
.footer a { color: #3A7D7C; text-decoration: none; }
</style>
</head>
<body>
<div class="container">
  <header>
    <h1>📊 課前暖身：三題快問</h1>
    <div class="sub">請點選你的答案。投票結果會即時顯示在投影幕上。</div>
  </header>

  <div class="q-card q1" data-q="q1">
    <span class="q-num">第 1 題</span>
    <div class="q-text">你聽過「瘦瘦針」嗎？</div>
    <div class="options">
      <button class="option-btn" data-c="yes">是，聽過</button>
      <button class="option-btn" data-c="no">沒聽過</button>
      <button class="option-btn" data-c="unsure">聽過但不熟</button>
    </div>
    <div class="thanks-msg">✅ 已投票，感謝！</div>
  </div>

  <div class="q-card q2" data-q="q2">
    <span class="q-num">第 2 題</span>
    <div class="q-text">你多久喝一次含糖飲料？</div>
    <div class="options">
      <button class="option-btn" data-c="daily">每天</button>
      <button class="option-btn" data-c="weekly">每週</button>
      <button class="option-btn" data-c="rare">很少</button>
    </div>
    <div class="thanks-msg">✅ 已投票，感謝！</div>
  </div>

  <div class="q-card q3" data-q="q3">
    <span class="q-num">第 3 題</span>
    <div class="q-text">超市的小份量蛋白棒變多了嗎？</div>
    <div class="options">
      <button class="option-btn" data-c="yes">有，明顯變多</button>
      <button class="option-btn" data-c="no">沒有變多</button>
      <button class="option-btn" data-c="unsure">沒注意</button>
    </div>
    <div class="thanks-msg">✅ 已投票，感謝！</div>
  </div>

  <div class="footer">
    投票結果即時顯示於老師端。<a href="lesson.html#3">看投影片</a>
  </div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-app.js';
import {
  getFirestore, addDoc, collection, serverTimestamp,
} from 'https://www.gstatic.com/firebasejs/10.13.0/firebase-firestore.js';

const firebaseConfig = {
  apiKey: 'AIzaSyCTLhRf7jcJH_AwUzbV4MawkrKNPrIVG5Y',
  authDomain: 'my-teaching-tools-517a0.firebaseapp.com',
  projectId: 'my-teaching-tools-517a0',
  storageBucket: 'my-teaching-tools-517a0.firebasestorage.app',
  messagingSenderId: '244288457011',
  appId: '1:244288457011:web:4b3ff8a846a6c50b169646',
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

// session = today's date (YYYY-MM-DD), so each class day gets fresh chart
const today = new Date();
const SESSION = today.getFullYear() + '-' + String(today.getMonth() + 1).padStart(2, '0') + '-' + String(today.getDate()).padStart(2, '0');

function lsKey(q) { return `glp1_warmup_${SESSION}_${q}`; }

// Restore previously voted state
document.querySelectorAll('.q-card').forEach(card => {
  const q = card.dataset.q;
  const prev = localStorage.getItem(lsKey(q));
  if (prev) {
    markVoted(card, prev);
  }
});

document.querySelectorAll('.option-btn').forEach(btn => {
  btn.addEventListener('click', async () => {
    const card = btn.closest('.q-card');
    const q = card.dataset.q;
    const c = btn.dataset.c;
    if (localStorage.getItem(lsKey(q))) return; // 已投過

    btn.disabled = true;
    btn.textContent = '⏳ 送出中…';
    try {
      await addDoc(collection(db, 'glp1_warmup_votes'), {
        question: q,
        choice: c,
        session: SESSION,
        timestamp: serverTimestamp(),
      });
      localStorage.setItem(lsKey(q), c);
      markVoted(card, c);
    } catch (e) {
      btn.disabled = false;
      btn.textContent = btn.dataset.original || '重試';
      alert('投票失敗：' + e.message);
    }
  });
  btn.dataset.original = btn.textContent;
});

function markVoted(card, choice) {
  card.querySelectorAll('.option-btn').forEach(b => {
    b.disabled = true;
    if (b.dataset.c === choice) b.classList.add('selected');
  });
  card.querySelector('.thanks-msg').classList.add('show');
}
</script>
</body>
</html>
